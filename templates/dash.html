<script type="module">
class filesystem{
    constructor(){
        this.root = null
    }
    async init(){
        this.root = await navigator.storage.getDirectory()
    }
    async write(filename, data) {
        try{
            const file = await this.root.getFileHandle(filename, {create : true})
            const write = await file.createWritable()
            await write.write(data)
            await write.close()
            return true
        }
        catch{
            return false
        }
    }
    async read(filename){
        try{
        const file = await this.root.getFileHandle(filename, {create : true})
        const read = await file.getFile()
        const content = await read.text()
        return content
        }
        catch(e){
            return e
        }

    }
    async delete(filename){
        try{
            await this.root.removeEntry(filename)
        }
        catch(e){
            return e
        }
    }
    async mkdir(directory){
        const dir = await this.root.getDirectoryHandle(directory, {create : true})
    }
    async ls(dirPath) {
    let currentHandle = this.root;
    const folders = dirPath.split('/').filter(Boolean);
    
    for (const folder of folders) {
        currentHandle = await currentHandle.getDirectoryHandle(folder, { create: false });
    }

    const contents = [];
    for await (const [name, handle] of currentHandle.entries()) {
        contents.push({ name, kind: handle.kind });
    }
    
    console.log(`Contents of ${dirPath}:`, contents);
    return contents;
}

}
const fs = new filesystem
await fs.init()
window.fs = fs
</script>
<script>
async function syncOfflineData() {
    if (navigator.onLine) {
        const queue = JSON.parse(localStorage.getItem('fetchqueue') || "[]");
        if (queue.length === 0) return;

        console.log(`Syncing ${queue.length} offline results...`);
        
        for (let i = 0; i < queue.length; i++) {
            const item = queue[i];
            try {
                await fetch(item.target, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(item.body)
                });
            } catch (err) {
                console.error("Sync failed for item, keeping in queue.");
                return; // Stop and try again next time if server is still down
            }
        }
        
        localStorage.removeItem('fetchqueue');
    }
}
async function saveset(title){
    const usernameres = await fetch('/api/getusername')
    const username = await usernameres.text()
    const res = await fetch(`/api/allcards?user=${username}&title=${title}`)
    const json = await res.json()
    const jsonstring = JSON.stringify(json)
    window.fs.write(`${title}.txt`, jsonstring)
    alert('Saved set!')
}
async function checkoffline() {
    let isOnline = false;
    // 1. Try to check network status
    try {
        const res = await fetch('/login');
        if (res.ok) {
            isOnline = true;
            syncOfflineData()
        }
    } catch (e) {
        // Fetch failed, we are definitely offline
        console.log("Network unreachable, checking local cache...");
        isOnline = false;
        alert("You appear to be offline, you can still study and use sets you saved. Just note that some features are unavailable")
    }

    // 2. If we are offline, load local cards
    if (!isOnline) {
        clearCards();
        try {
            const files = await window.fs.ls('/');
            console.log(files)
            for (let i = 0; i < files.length; i++) {
                if (files[i].kind === 'file' && files[i].name.includes('.txt')) {
                    const data = await window.fs.read(files[i].name);
                    const json = JSON.parse(data);
                    json.forEach(obj => {
                        createcard(obj.Title, obj.cards, obj.description)
                    })
                }
            }
        } catch (e) {
            console.log('No offline cards found or filesystem error');
        }
    }
}

                    console.log(filename)
                    console.log(file)

                    if (filename === name){
                        console.log('deleting')
                        await window.fs.delete(`${name}.txt`)
                    }
            }
            window.location.href = '/dash'
        }
    async function loadcards(){
        await fetch('/api/cards?clear=True')
        .then(response => response.json())
        .then(data => {
            data.forEach(set => {
                createcard(set.Title, set.cards, set.description);
            });
        });
    }
    async function createcard(Title, cards, desc) {
        let offline = false
        let extrastyle = ''
        let data;
        let avg;
        let bg;
        let total = 0
        let fet
        let btn =  `<button class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm text-white" onclick="saveset('${Title}')">Save set</button>`;
        const files = await window.fs.ls('/')
        for (let i=0; i<files.length; i++){
            file = files[i]
            if (file.name.replace('.txt', '') === Title){
                btn = ''
            }
        }
        try{
            fet = await fetch(`/api/getpercent?title=${encodeURIComponent(Title)}`)
        }
        catch(e){
            offline = true
        }
        if (offline === true){
            extastyle = 'hidden'
        }
        if (!offline){
        data = await fet.json()
        data.forEach(function(item){
            total += parseInt(item)
        })
        avg = total / data.length || 0
        const confidence = data.length / (data.length + 2);
        avg = (avg * confidence).toFixed(2);
        bg = avg > 80 ? 'bg-green-500/20' : avg > 45 ? 'bg-yellow-500/20' : 'bg-red-500/20'    
        } 
        else{
            avg = 0
            bg = ''
        }
        const div = document.createElement("div");
        div.setAttribute('title', avg > 80 ? `Your memory score is ${avg}` : avg > 45 ? `score: ${avg}, not bad needs improvment` : 'You really need to work on this');
        div.className = `glass-panel rounded-lg m-10 p-6 hover:cursor-pointer h-full w-[20vw] grid grid-rows-[auto_1fr_auto] ${bg}`
        div.innerHTML = `
<div id="menu-${Title}" popover class="fixed w-40 bg-slate-800 border border-white/10 rounded-md shadow-2xl z-[100] py-2">
    <div class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm"><input class="public-input" title="${Title}" type="checkbox" id="${Title}-check"><label for="${Title}-check">Public</label></div>

        <div class="row-start-2 row-end-2" onclick="opencards('${Title}')">
            <h2 class="text-2xl mb-4">${Title}</h2>
            <p class="text-white/70 text-xl">${cards} Cards</p>

        <div class="row-start-3 row-end-3 ${extrastyle}">

        document.getElementById("cards").appendChild(div);
    }
    function editcard(title){
        window.location.href = `/create?edit=${title}`
    }
function udpatepubliccheckbox() {
    // 1. Use querySelectorAll to get a NodeList (which supports forEach)
    const elements = document.querySelectorAll('.public-input');

    elements.forEach(ele => {
        // 2. Use 'const' so 'title' stays scoped to this specific checkbox
        const title = ele.getAttribute('title');

        // Initial sync with the server
        fetch(`/api/ispublic?name=${encodeURIComponent(title)}`)
            .then(res => res.text())
            .then(data => {
                ele.checked = (data === 'True');
            });

        // Event listener for changes
        ele.addEventListener('change', () => {
            const isPublic = ele.checked;
            fetch(`/api/setpublic?name=${encodeURIComponent(title)}&public=${isPublic}`, { method: 'POST' })
                .then(res => {
                    if (!res.ok) {
                        alert('Failed to update public status');
                        ele.checked = !isPublic; 
                    }
                })
                .catch(() => {
                    alert('An error occurred while updating public status');
                    ele.checked = !isPublic;
                });
        });
    });
}
function clearCards(){
    document.getElementById("cards").innerHTML = ''
}
