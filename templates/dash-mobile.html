        </main>
<script type="module">
class filesystem{
    constructor(){
        this.root = null
    }
    async init(){
        this.root = await navigator.storage.getDirectory()
    }
    async write(filename, data) {
        try{
            const file = await this.root.getFileHandle(filename, {create : true})
            const write = await file.createWritable()
            await write.write(data)
            await write.close()
            return true
        }
        catch{
            return false
        }
    }
    async read(filename){
        try{
        const file = await this.root.getFileHandle(filename, {create : true})
        const read = await file.getFile()
        const content = await read.text()
        return content
        }
        catch(e){
            return e
        }

    }
    async delete(filename){
        try{
            await this.root.removeEntry(filename)
        }
        catch(e){
            return e
        }
    }
    async mkdir(directory){
        const dir = await this.root.getDirectoryHandle(directory, {create : true})
    }
    async ls(dirPath) {
    let currentHandle = this.root;
    const folders = dirPath.split('/').filter(Boolean);
    
    for (const folder of folders) {
        currentHandle = await currentHandle.getDirectoryHandle(folder, { create: false });
    }

    const contents = [];
    for await (const [name, handle] of currentHandle.entries()) {
        contents.push({ name, kind: handle.kind });
    }
    
    console.log(`Contents of ${dirPath}:`, contents);
    return contents;
}

}
const fs = new filesystem
await fs.init()
window.fs = fs
</script>
    <script>
        async function syncOfflineData() {
    if (navigator.onLine) {
        const queue = JSON.parse(localStorage.getItem('fetchqueue') || "[]");
        if (queue.length === 0) return;

        console.log(`Syncing ${queue.length} offline results...`);
        
        for (let i = 0; i < queue.length; i++) {
            const item = queue[i];
            try {
                await fetch(item.target, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(item.body)
                });
            } catch (err) {
                console.error("Sync failed for item, keeping in queue.");
                return; // Stop and try again next time if server is still down
            }
        }
        
        localStorage.removeItem('fetchqueue');
    }
}
async function saveset(title){
    const usernameres = await fetch('/api/getusername')
    const username = await usernameres.text()
    const res = await fetch(`/api/allcards?user=${username}&title=${title}`)
    const json = await res.json()
    const jsonstring = JSON.stringify(json)
    window.fs.write(`${title}.txt`, jsonstring)
    alert('Saved Set!')
}
async function checkoffline() {
    let isOnline = false;
    // 1. Try to check network status
    try {
        const res = await fetch('/login');
        if (res.ok) {
            isOnline = true;
            syncOfflineData()
        }
    } catch (e) {
        // Fetch failed, we are definitely offline
        console.log("Network unreachable, checking local cache...");
        isOnline = false;
        alert("You appear to be offline, you can still study and use sets you saved. Just note that some features are unavailable")
    }

    // 2. If we are offline, load local cards
    if (!isOnline) {
        clearCards();
        try {
            const files = await window.fs.ls('/');
            console.log(files)
            for (let i = 0; i < files.length; i++) {
                if (files[i].kind === 'file' && files[i].name.includes('.txt')) {
                    const data = await window.fs.read(files[i].name);
                    const json = JSON.parse(data);
                    try{
                        createcard(json[0].Title, json[0].cards, json[0].description)
                    }
                    catch {
                        createcard(json.Title, json.cards, json.description)
                    }
                }
            }
        } catch (e) {
            console.log('No offline cards found or filesystem error:', e);
        }
    }
}
        // Load cards on startup
        setTimeout(function(){
            udpatepubliccheckbox()
            checkoffline()
        }, 1000)
        loadcards();

        function opencards(setname) {
            window.location.href = `/viewcard?setname=${encodeURIComponent(setname)}`;
        }

        function editcard(title) {
            window.location.href = `/create?edit=${encodeURIComponent(title)}`;
        }

        async function deleteset(name){
        if (!confirm(`Are you sure you want to delete "${name}"?`)) return;
        await fetch(`/api/delete?name=${name}`)
        .then( respons => {
            if (!respons.ok){
                alert('UKNOWN ERROR')
            }
        })
            const files = await window.fs.ls('/')
            for (let i=0; i < files.length; i++){
                    const file = files[i]
                    const filename = file.name.replace('.txt', '')
                    console.log(filename)
                    console.log(file)
                    console.log(name)
                    if (filename === name){
                        console.log('deleting')
                        await window.fs.delete(`${name}.txt`)
                    }
            }
            window.location.href = '/dash'
        }

        async function loadcards() {
            try {
                const response = await fetch('/api/cards?clear=True');
                const data = await response.json();
                const container = document.getElementById("cards");
                container.innerHTML = ''; // Clear container

                data.forEach(set => {
                    createcard(set.Title, set.cards, set.description);
                });
            } catch (err) {
                console.error("Failed to load cards:", err);
            }
        }

        async function createcard(Title, cardCount, desc) { 
        let offline = false
        let extrastyle = ''
        let data;
        let avg;
        let bg;
        let total = 0
        let fet
        let btn =  `<button class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm text-white" onclick="saveset('${Title}')">Save set</button>`;
        const files = await window.fs.ls('/')
        for (let i=0; i<files.length; i++){
            file = files[i]
            if (file.name.replace('.txt', '') === Title){
                btn = ''
            }
        }
        try{
            fet = await fetch(`/api/getpercent?title=${encodeURIComponent(Title)}`)
        }
        catch(e){
            offline = true
        }
        if (offline === true){
            extastyle = 'hidden'
        }
        if (!offline){
        data = await fet.json()
        data.forEach(function(item){
            total += parseInt(item)
        })
        avg = total / data.length || 0
        const confidence = data.length / (data.length + 2);
        avg = (avg * confidence).toFixed(2);
        bg = avg > 80 ? 'bg-green-500/20' : avg > 45 ? 'bg-yellow-500/20' : 'bg-red-500/20'    
        } 
        else{
            avg = 0
            bg = ''
        }
            const card = document.createElement("div");
            // Modern glassmorphism style, flexible height for mobile
            card.className = "grid min-w-0 break-words grid-rows-[auto_1fr_auto]  border border-white/10 rounded-2xl overflow-hidden hover:border-white/30 transition-all " + bg;
            card.innerHTML = `
            <div id="menu-${Title}" popover class="fixed w-40 bg-slate-800 border border-white/10 rounded-md shadow-2xl z-[100] py-2">
                <div class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm"><input class="public-input mr-2" title="${Title}" type="checkbox" id="${Title}-check"><label for="${Title}-check">Public</label></div>
                <button class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm" onclick="editcard('${Title}')">Edit</button>
                <button class="block w-full text-left px-4 py-2 hover:bg-white/10 text-sm text-red-400" onclick="deleteset('${Title}')">Delete</button>
                ${btn}
                </div>
                <div>
                        <svg 
                            onclick="
                            event.stopPropagation();
                            const m = document.getElementById('menu-${Title}');
                            // Position it FIRST
                            m.style.position = 'fixed';
                            m.style.margin = '0'; // Reset default popover margins
                            m.style.left = event.clientX + 'px';
                            m.style.top = event.clientY + 'px';
                            // Then show it
                            m.showPopover();
                            "
                            xmlns="http://www.w3.org/2000/svg" 
                            class=" ml-2 mt-2 justify-self-start hover:bg-white/10 rounded-full p-1 cursor-pointer" 
                            height="30px" viewBox="0 -960 960 960" width="30px" fill="#e3e3e3">
                            <path d="M479.91-160q-24.24 0-41.41-17.26-17.17-17.26-17.17-41.5t17.26-41.41q17.27-17.16 41.5-17.16 24.24 0 41.41 17.26 17.17 17.26 17.17 41.5t-17.26 41.4Q504.14-160 479.91-160Zm0-261.33q-24.24 0-41.41-17.26-17.17-17.27-17.17-41.5 0-24.24 17.26-41.41 17.27-17.17 41.5-17.17 24.24 0 41.41 17.26 17.17 17.27 17.17 41.5 0 24.24-17.26 41.41-17.27 17.17-41.5 17.17Zm0-261.34q-24.24 0-41.41-17.26-17.17-17.26-17.17-41.5t17.26-41.4Q455.86-800 480.09-800q24.24 0 41.41 17.26 17.17 17.26 17.17 41.5t-17.26 41.41q-17.27 17.16-41.5 17.16Z"/>
                        </svg>
                </div>
                <div class="p-6 break-words flex-grow cursor-pointer active:bg-white/5" onclick="opencards('${Title}')" role="button" aria-label="Open ${Title}">
                    <h2 class="text-2xl md:text-3xl font-bold mb-1">${Title}</h2>
                    <p class="text-blue-400 font-medium mb-3">${cardCount} Cards</p>
                    <p class="text-gray-400 text-lg line-clamp-3">${desc || 'No description provided.'}</p>
                </div>
                </div class="row-start-3 row-end-3">
                <progress value="${avg}" title="Your memory score" max="100" class="w-full h-2 rounded-full overflow-hidden">
                <div>
            `;
            document.getElementById("cards").appendChild(card);
        }
        function udpatepubliccheckbox() {
    // 1. Use querySelectorAll to get a NodeList (which supports forEach)
    const elements = document.querySelectorAll('.public-input');

    elements.forEach(ele => {
        // 2. Use 'const' so 'title' stays scoped to this specific checkbox
        const title = ele.getAttribute('title');

        // Initial sync with the server
        fetch(`/api/ispublic?name=${encodeURIComponent(title)}`)
            .then(res => res.text())
            .then(data => {
                ele.checked = (data === 'True');
            });

        // Event listener for changes
        ele.addEventListener('change', () => {
            const isPublic = ele.checked;
            fetch(`/api/setpublic?name=${encodeURIComponent(title)}&public=${isPublic}`, { method: 'POST' })
                .then(res => {
                    if (!res.ok) {
                        alert('Failed to update public status');
                        ele.checked = !isPublic; 
                    }
                })
                .catch(() => {
                    alert('An error occurred while updating public status');
                    ele.checked = !isPublic;
                });
        });
    });
}
function clearCards(){
    document.getElementById("cards").innerHTML = ''
}
</script>
